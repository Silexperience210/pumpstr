<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pumpstr · overlay</title>
<link rel="stylesheet" href="/pumpstr.css" />
<style>
  /* OBS : source navigateur. Pour compositer sur la vidéo, coche "transparent" /
     mets ?clear=1 (fond retiré). En standalone : fond ink. */
  html,body{ height:100%; overflow:hidden; }
  body{ background:radial-gradient(120% 120% at 50% 8%, #0e1a0f 0%, var(--ink) 60%, #04060500 100%); user-select:none; cursor:none; }
  body.clear{ background:transparent; }

  /* flash + shockwave à chaque tip */
  #flash{ position:fixed; inset:0; pointer-events:none; opacity:0;
    background:radial-gradient(60% 50% at 50% 44%, rgba(188,255,46,.30), transparent 70%); }
  #flash.on{ animation:flash .6s ease-out; }
  @keyframes flash{ 0%{opacity:1} 100%{opacity:0} }
  .shock{ position:fixed; left:50%; top:46%; width:40px; height:40px; margin:-20px 0 0 -20px; border-radius:50%;
    border:2px solid var(--lime); pointer-events:none; animation:shock 1s var(--ease) forwards; }
  @keyframes shock{ 0%{ opacity:.9; transform:scale(.4) } 100%{ opacity:0; transform:scale(11) } }

  .top{ position:fixed; top:24px; left:26px; right:26px; display:flex; justify-content:space-between; align-items:center; gap:14px; }
  .brand{ font-family:var(--display); font-weight:800; letter-spacing:-.02em; font-size:22px; display:flex; align-items:center; gap:9px; }
  .brand b{ color:var(--lime); text-shadow:0 0 20px rgba(188,255,46,.5); }
  .addr{ font-family:var(--mono); font-size:12px; letter-spacing:.06em; color:var(--txt-faint); }

  .stage{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .label{ font-family:var(--mono); text-transform:uppercase; letter-spacing:.5em; font-size:13px; color:var(--txt-dim); margin-bottom:4px; }
  .counter{ font-family:var(--mono); font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.04em;
    font-size:clamp(72px,17vw,216px); line-height:.92; color:var(--lime);
    text-shadow:0 0 24px rgba(188,255,46,.55), 0 0 80px rgba(188,255,46,.28);
    animation:breathe 3s var(--ease) infinite; transition:transform .18s cubic-bezier(.2,1.7,.4,1); }
  .counter.pop{ transform:scale(1.13); }
  @keyframes breathe{ 50%{ text-shadow:0 0 34px rgba(188,255,46,.85), 0 0 110px rgba(188,255,46,.4) } }
  .unit{ font-family:var(--mono); font-size:clamp(15px,3vw,26px); letter-spacing:.4em; text-transform:uppercase; color:var(--lime-soft); margin-top:12px; opacity:.85; }

  .hype{ position:fixed; left:50%; bottom:104px; transform:translateX(-50%); width:min(600px,72vw); height:9px;
    background:rgba(255,255,255,.07); border-radius:99px; overflow:hidden; box-shadow:inset 0 0 0 1px var(--line-2); }
  .hype>i{ display:block; height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg, var(--magenta), var(--amber), var(--lime)); transition:width .5s var(--ease);
    box-shadow:0 0 18px var(--lime); }
  .ticker{ position:fixed; bottom:30px; left:0; right:0; text-align:center; font-family:var(--mono); font-size:14px; color:var(--txt-dim); height:22px; letter-spacing:.02em; }
  .ticker b{ color:var(--lime); }

  /* tip qui monte */
  .float{ position:fixed; left:50%; bottom:32%; transform:translateX(-50%); text-align:center; pointer-events:none;
    animation:rise 2.2s cubic-bezier(.2,.8,.2,1) forwards; }
  .float .ava{ width:58px; height:58px; border-radius:50%; display:block; margin:0 auto 8px; background:var(--ink-2);
    border:2px solid var(--lime); box-shadow:0 0 22px rgba(188,255,46,.6); }
  .float .amt{ font-family:var(--mono); font-weight:800; font-size:50px; color:#fff; text-shadow:0 0 26px rgba(188,255,46,.7); white-space:nowrap; }
  .float .amt .s{ color:var(--lime); }
  .float .who{ display:block; font-family:var(--mono); font-weight:600; font-size:16px; color:var(--magenta); margin-top:3px; }
  .float .cmt{ display:block; font-family:var(--display); font-size:16px; color:var(--txt); margin-top:4px; max-width:60vw; margin-inline:auto; }
  @keyframes rise{ 0%{opacity:0; transform:translate(-50%,24px) scale(.78)} 12%{opacity:1; transform:translate(-50%,0) scale(1)} 100%{opacity:0; transform:translate(-50%,-280px) scale(1.06)} }

  .coin{ position:fixed; bottom:36%; font-size:28px; pointer-events:none; animation:burst 1.5s ease-out forwards; }
  @keyframes burst{ 0%{opacity:0; transform:translateY(0) scale(.5)} 15%{opacity:1} 100%{opacity:0; transform:translate(var(--dx),-200px) rotate(var(--rot)) scale(1.15)} }
  @media (prefers-reduced-motion:reduce){ .counter{animation:none} }
</style>
</head>
<body>
  <div id="flash"></div>
  <div class="top">
    <div class="brand">⚡<b>PUMPSTR</b></div>
    <div class="ps-pill ps-pill--live">Live</div>
    <div class="addr" id="addr">connexion…</div>
  </div>

  <div class="stage">
    <div class="label">sats ce live</div>
    <div class="counter" id="counter">0</div>
    <div class="unit">⚡ satoshi</div>
  </div>

  <div class="hype"><i id="hype"></i></div>
  <div class="ticker" id="ticker">en attente du premier tip…</div>

<script>
  const counterEl = document.getElementById("counter");
  const addrEl = document.getElementById("addr");
  const tickerEl = document.getElementById("ticker");
  const hypeEl = document.getElementById("hype");
  const flashEl = document.getElementById("flash");
  if (new URLSearchParams(location.search).get("clear") === "1") document.body.classList.add("clear");

  let total = 0, shown = 0, comboTimer = null, combo = 0;
  const fmt = (n) => n.toLocaleString("fr-FR");

  function animateCount() {
    const step = () => {
      const diff = total - shown;
      if (Math.abs(diff) < 1) { shown = total; counterEl.textContent = fmt(total); return; }
      shown += diff * 0.18;
      counterEl.textContent = fmt(Math.round(shown));
      requestAnimationFrame(step);
    };
    step();
  }

  const dicebear = (seed) => `https://api.dicebear.com/9.x/bottts-neutral/svg?seed=${encodeURIComponent(seed || "anon")}`;
  const esc = (s) => String(s ?? "").replace(/[<>&]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
  const GLYPHS = ["⚡", "🪙", "₿", "✦"];

  function floatTip(tip) {
    const ava = tip.picture || dicebear(tip.pubkey || tip.name);
    const f = document.createElement("div");
    f.className = "float";
    f.innerHTML =
      `<img class="ava" src="${esc(ava)}" onerror="this.src='${dicebear(tip.name)}'" />` +
      `<div class="amt">+${fmt(tip.amount)} <span class="s">⚡</span></div>` +
      `<span class="who">${esc(tip.name || "anon")}</span>` +
      (tip.comment ? `<span class="cmt">“${esc(tip.comment)}”</span>` : "");
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 2400);
    const n = Math.min(4 + Math.round(tip.amount / 800), 18);
    for (let i = 0; i < n; i++) {
      const c = document.createElement("div");
      c.className = "coin"; c.textContent = GLYPHS[(Math.random() * GLYPHS.length) | 0];
      c.style.left = (50 + (Math.random() * 34 - 17)) + "vw";
      c.style.setProperty("--dx", (Math.random() * 280 - 140) + "px");
      c.style.setProperty("--rot", (Math.random() * 560 - 280) + "deg");
      c.style.animationDelay = (Math.random() * .18) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1600);
    }
  }

  function shockwave() {
    const s = document.createElement("div");
    s.className = "shock";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }

  function onTip(tip) {
    total += tip.amount;
    animateCount();
    counterEl.classList.add("pop");
    setTimeout(() => counterEl.classList.remove("pop"), 200);
    flashEl.classList.remove("on"); void flashEl.offsetWidth; flashEl.classList.add("on");
    shockwave();
    floatTip(tip);
    tickerEl.innerHTML = `dernier tip : <b>+${fmt(tip.amount)} sats</b> par ${esc(tip.name || "anon")}`;
    combo += tip.amount;
    hypeEl.style.width = Math.min(100, (combo / 21000) * 100) + "%";
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => { combo = 0; hypeEl.style.width = "0%"; }, 6000);
  }

  function connect() {
    const ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`);
    ws.onmessage = (ev) => {
      const m = JSON.parse(ev.data);
      if (m.type === "hello") {
        addrEl.textContent = m.npub ? m.npub.slice(0, 12) + "…" + m.npub.slice(-6)
          : (m.address ? m.address.slice(0, 12) + "…" : "");
      } else if (m.type === "tip") {
        onTip({ amount: Number(m.amount), name: m.name, picture: m.picture, comment: m.comment, pubkey: m.pubkey });
      }
    };
    ws.onclose = () => setTimeout(connect, 1500);
  }
  connect();
</script>
</body>
</html>
