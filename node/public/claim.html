<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pumpstr — Encaisse tes sats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/pumpstr.css" />
  <style>
    .wrap{ max-width:680px; margin:0 auto; padding:clamp(28px,6vw,68px) clamp(16px,5vw,26px) 90px; }
    header h1{ font-size:clamp(46px,12vw,88px); margin:.28em 0 .2em; }
    header h1 .lime{ color:var(--lime); text-shadow:0 0 34px rgba(188,255,46,.4); }
    .lede{ max-width:48ch; font-size:14px; color:var(--txt-dim); margin:0 0 26px; }
    .lede b{ color:var(--txt); font-weight:500; }
    .ps-field{ margin-top:6px; }

    .summary{ display:flex; align-items:baseline; gap:10px; margin:34px 2px 14px; }
    .summary .big{ font-size:15px; }
    .summary .lime{ color:var(--lime); }

    .ledger{ display:grid; gap:18px; margin-top:14px; }
    .reward{ padding:24px clamp(18px,4vw,28px); opacity:0; transform:translateY(22px) scale(.98);
      animation:dealup .7s var(--ease) forwards; }
    @keyframes dealup{ to{ opacity:1; transform:none } }
    .r-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:14px; }
    .r-amt .ps-sats{ font-size:clamp(40px,10vw,62px); display:inline-flex; align-items:baseline; gap:.12em; }
    .r-memo{ font-family:var(--display); font-weight:500; font-size:17px; color:var(--txt); margin:12px 0 2px; }
    .r-meta{ font-size:11px; letter-spacing:.04em; margin-top:8px; }
    .r-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }

    .keypanel{ margin-top:16px; padding:15px; border:1px solid rgba(255,46,147,.3); border-radius:var(--r-sm);
      background:rgba(255,46,147,.05); }
    .keypanel[hidden]{ display:none; }
    .warn{ font-size:11px; line-height:1.5; color:#ff9ac7; margin-bottom:11px; }
    .warn b{ color:var(--magenta); }
    .cstatus{ margin-top:11px; min-height:16px; font-size:12px; }
    .cstatus.run{ color:var(--lime); } .cstatus.run::before{ content:"⟳ "; display:inline-block; animation:spin 1s linear infinite; }
    .cstatus.ok{ color:var(--lime); font-weight:500; } .cstatus.err{ color:var(--magenta); }
    .cstatus .txid{ color:var(--txt-faint); font-size:11px; }
    @keyframes spin{ to{ transform:rotate(360deg) } }

    .ref-row{ margin-top:14px; font-size:11px; color:var(--txt-faint); }
    .ref-box{ margin-top:6px; font-size:10.5px; line-height:1.5; color:var(--txt-dim); background:rgba(0,0,0,.35);
      border:1px dashed var(--line-2); border-radius:8px; padding:10px 11px; word-break:break-all; max-height:0; overflow:hidden;
      transition:max-height .4s var(--ease), padding .4s; padding-top:0; padding-bottom:0; }
    .ref-box.open{ max-height:160px; padding:10px 11px; }

    .state{ text-align:center; margin-top:46px; }
    .state .ps-pill{ font-size:12px; }
    .empty-num{ font-family:var(--display); font-weight:780; font-size:54px; color:var(--txt-faint); letter-spacing:-.04em; }

    footer{ margin-top:64px; padding-top:18px; border-top:1px solid var(--line-2); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;
      font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--txt-faint); }
    footer .creed{ color:var(--lime); }
  </style>
</head>
<body>
  <div class="ps-bg"></div>
  <div class="ps-grain"></div>

  <main class="wrap">
    <header>
      <div class="ps-pill ps-pill--live ps-rise">⚡ Pumpstr · Rewards</div>
      <h1 class="ps-display ps-rise" style="animation-delay:.05s">Tes <span class="lime">sats</span><br>t'attendent.</h1>
      <p class="lede ps-rise" style="animation-delay:.1s">Des sats parqués pour toi en escrow Arkade. Encaissables <b>seulement par ta clé</b> —
        self-custody, signés ici, dans ton navigateur. Le coffre ne touche jamais ta clé privée.</p>
      <div class="ps-field ps-rise" style="animation-delay:.15s">
        <input id="npub" class="ps-input" placeholder="npub1…  (ta clé publique Nostr)" autocomplete="off" spellcheck="false" />
        <button id="go" class="ps-btn ps-btn--pump">Charger ⚡</button>
      </div>
    </header>

    <section id="out" aria-live="polite"></section>

    <footer>
      <span class="creed">Not your keys · not your sats.</span>
      <span>Bitcoin only · self-custody · ⚡ Arkade</span>
    </footer>
  </main>

  <script type="module">
    import { nip19 } from "https://esm.sh/nostr-tools@2.7.2";

    /* ===== CLAIM IN-BROWSER (self-custody) — miroir de ArkadeRail.claim() ===== */
    const OPERATORS = { mutinynet:"https://mutinynet.arkade.sh", bitcoin:"https://arkade.computer", signet:"https://mutinynet.arkade.sh" };
    const ESCROW_TYPE = "pumpstr-escrow";
    const bhex = (u) => Array.from(u, (b) => b.toString(16).padStart(2, "0")).join("");
    const unhex = (h) => Uint8Array.from(h.match(/.{1,2}/g).map((x) => parseInt(x, 16)));
    function decodeRef(id){
      if(!id || !id.startsWith("pumpstr-claim&")) throw new Error("jeton de claim invalide");
      const out={}; for(const p of id.slice(14).split("&")){ const i=p.indexOf("="); if(i>0) out[p.slice(0,i)]=p.slice(i+1); }
      for(const k of ["net","tapTree","claimLeaf","beneficiary","expiry","amount","tx"]) if(!(k in out)) throw new Error("jeton incomplet ("+k+")");
      if(/…|\.\.\./.test(out.tapTree)) throw new Error("jeton tronqué (aperçu démo) — il faut un vrai bon émis par un node");
      return out;
    }
    let _sdk; const loadSdk = async () => (_sdk ??= await import("https://esm.sh/@arkade-os/sdk@0.4.36"));
    function ensureHandler(sdk){
      if(sdk.contractHandlers.has(ESCROW_TYPE)) return;
      sdk.contractHandlers.register({ type:ESCROW_TYPE,
        createScript(p){ const v=sdk.VtxoScript.decode(unhex(p.tapTree)); const l=v.findLeaf(p.claimLeaf); v.forfeit=()=>l; v.exit=()=>l; return v; },
        serializeParams:p=>p, deserializeParams:p=>p, selectPath:()=>null, getAllSpendingPaths:()=>[] });
    }
    function privFromInput(v){
      const t=(v||"").trim();
      if(/^[0-9a-fA-F]{64}$/.test(t)) return t.toLowerCase();
      try{ const d=nip19.decode(t); if(d.type==="nsec") return bhex(d.data); }catch{ /* */ }
      throw new Error("clé invalide — attendu nsec1… ou 64 hex");
    }
    async function claimInBrowser(refStr, privHex, onStep){
      const r = decodeRef(refStr);
      onStep?.("Chargement du SDK Arkade…");
      const sdk = await loadSdk();
      const identity = sdk.SingleKey.fromHex(privHex);
      if(bhex(await identity.xOnlyPublicKey()) !== r.beneficiary.toLowerCase()) throw new Error("cette clé n'est pas le bénéficiaire de ce bon");
      const url = OPERATORS[r.net] || OPERATORS.mutinynet;
      onStep?.("Connexion au coffre…");
      const wallet = await sdk.Wallet.create({ identity, arkServerUrl:url });
      const info = await new sdk.RestArkProvider(url).getInfo();
      const serverX = unhex(sdk.toXOnlySignerHex(info.signerPubkey));
      const prefix = info.network === "bitcoin" ? "ark" : "tark";
      const script = sdk.VtxoScript.decode(unhex(r.tapTree));
      const claimLeaf = script.findLeaf(r.claimLeaf);
      const pkScript = bhex(script.pkScript);
      ensureHandler(sdk);
      await wallet.contractRepository.saveContract({ type:ESCROW_TYPE, params:{pubKey:r.beneficiary,tapTree:r.tapTree,claimLeaf:r.claimLeaf},
        script:pkScript, address:script.address(prefix,serverX).encode(), state:"active", createdAt:Date.now() });
      onStep?.("Recherche du bon dans le coffre…");
      const { vtxos } = await new sdk.RestIndexerProvider(url).getVtxos({ scripts:[pkScript] });
      const spend = vtxos.filter(v => !v.isSpent && !v.spentBy && !v.isUnrolled && v.value > 0);
      if(!spend.length) throw new Error("aucun VTXO réclamable (déjà encaissé, ou pas encore confirmé)");
      const tapTree = script.encode();
      const inputs = spend.map(v => ({ ...v, tapTree, forfeitTapLeafScript:claimLeaf, intentTapLeafScript:claimLeaf }));
      const total = spend.reduce((s,v)=>s+v.value,0);
      const myPk = sdk.ArkAddress.decode(await wallet.getAddress()).pkScript;
      onStep?.("Signature & soumission…");
      const { arkTxid } = await wallet.buildAndSubmitOffchainTx(inputs, [{ script:myPk, amount:BigInt(total) }]);
      return { txid:arkTxid, amount:total };
    }

    /* ===== UI ===== */
    const $ = (s,r=document)=>r.querySelector(s);
    const out = $("#out"), input = $("#npub");
    const fmt = (n)=>new Intl.NumberFormat("fr-FR").format(n);
    const esc = (s)=>String(s).replace(/[&<>"]/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    const shortKey = (k)=> k.length>26 ? k.slice(0,15)+"…"+k.slice(-7) : k;

    function countUp(el, target){
      const dur=900, t0=performance.now();
      const step=(t)=>{ const p=Math.min(1,(t-t0)/dur); el.textContent=fmt(Math.round(target*(1-Math.pow(1-p,3)))); if(p<1) requestAnimationFrame(step); };
      requestAnimationFrame(step);
    }

    function reward(rw, npub, i){
      const serial = (rw.id||rw.ref||"").toString().toUpperCase().replace(/[^A-Z0-9]/g,"").slice(-8) || "BEARER";
      const issued = rw.createdAt ? new Date(rw.createdAt).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}) : "—";
      const el = document.createElement("article");
      el.className = "reward ps-card ps-card--glow";
      el.style.animationDelay = (.08*i + .05) + "s";
      el.innerHTML = `
        <div class="r-top">
          <div class="r-amt"><span class="ps-sats ps-pulse"><span data-n>0</span><span class="u">sats</span></span></div>
          <div class="ps-pill">#${serial}</div>
        </div>
        ${rw.reason ? `<div class="r-memo">${esc(rw.reason)}</div>` : ""}
        <div class="r-meta ps-faint">Émis ${issued} · à l'ordre de ${esc(shortKey(npub))}</div>
        <div class="r-actions">
          <button class="ps-btn ps-btn--pump" data-here>⚡ Encaisser ici</button>
          <button class="ps-btn ps-btn--ghost" data-copy>Copier le jeton</button>
          <button class="ps-btn ps-btn--ghost" data-toggleref>Voir le jeton</button>
        </div>
        <div class="ref-box" data-refbox>${esc(rw.ref)}</div>
        <div class="keypanel" data-panel hidden>
          <div class="warn"><b>Ta clé privée (nsec)</b> signe localement, dans cet onglet — jamais envoyée au coffre ni au réseau. Ne la colle nulle part ailleurs.</div>
          <div class="ps-field">
            <input type="password" class="ps-input" data-key placeholder="nsec1…  (ta clé privée)" autocomplete="off" spellcheck="false" />
            <button class="ps-btn ps-btn--mag" data-sign>Signer ⚡</button>
          </div>
          <div class="cstatus" data-cstatus></div>
        </div>`;

      countUp(el.querySelector("[data-n]"), rw.amount);

      el.querySelector("[data-copy]").addEventListener("click",(e)=>{ navigator.clipboard?.writeText(rw.ref);
        e.target.textContent="✓ copié"; setTimeout(()=>e.target.textContent="Copier le jeton",1400); });
      el.querySelector("[data-toggleref]").addEventListener("click",()=> el.querySelector("[data-refbox]").classList.toggle("open"));

      const panel = el.querySelector("[data-panel]");
      el.querySelector("[data-here]").addEventListener("click",()=>{ panel.hidden=!panel.hidden; if(!panel.hidden) el.querySelector("[data-key]").focus(); });
      el.querySelector("[data-sign]").addEventListener("click", async (e)=>{
        const st=el.querySelector("[data-cstatus]"), keyEl=el.querySelector("[data-key]"), btn=e.target;
        let priv; try{ priv=privFromInput(keyEl.value); }catch(err){ st.className="cstatus err"; st.textContent=err.message; return; }
        btn.disabled=true; st.className="cstatus run"; st.textContent="préparation…";
        try{
          const res = await claimInBrowser(rw.ref, priv, (m)=>{ st.textContent=m; });
          keyEl.value=""; priv=null;
          st.className="cstatus ok"; st.innerHTML=`Encaissé ✓ · +${fmt(res.amount)} sats · <span class="txid">${esc(res.txid.slice(0,16))}…</span>`;
          el.style.borderColor="var(--lime)";
          try{ await fetch("/api/reward/claimed",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:rw.id})}); }catch{}
        }catch(err){ st.className="cstatus err"; st.textContent="Échec : "+(err?.message??err); btn.disabled=false; }
      });
      return el;
    }

    function renderList(rewards, npub, preview){
      const total = rewards.reduce((s,r)=>s+r.amount,0);
      out.innerHTML = `<div class="summary"><span class="ps-num lime" style="font-size:22px">${rewards.length}</span>
        <span class="big ps-dim">bon${rewards.length>1?"s":""} au porteur · <span class="lime ps-num">${fmt(total)}</span> sats${preview?` <span style="color:var(--magenta)">· aperçu</span>`:""}</span></div>
        <div class="ledger"></div>`;
      const led = $(".ledger", out);
      rewards.forEach((rw,i)=> led.appendChild(reward(rw, npub, i)));
    }

    async function load(){
      const v = input.value.trim(); if(!v){ input.focus(); return; }
      let npub=v;
      try{ if(/^[0-9a-f]{64}$/i.test(v)) npub=nip19.npubEncode(v.toLowerCase()); else nip19.decode(v); }
      catch{ out.innerHTML=`<div class="state"><span class="ps-pill" style="color:var(--magenta);border-color:var(--magenta)">npub invalide</span></div>`; return; }
      out.innerHTML=`<div class="state"><span class="ps-pill ps-pill--live">Vérification du porteur…</span></div>`;
      let data; try{ data=await fetch(`/api/rewards?to=${encodeURIComponent(npub)}`).then(r=>r.json()); }
      catch{ out.innerHTML=`<div class="state"><span class="ps-pill" style="color:var(--magenta)">coffre injoignable</span></div>`; return; }
      if(data.error){ out.innerHTML=`<div class="state"><span class="ps-pill" style="color:var(--magenta)">${esc(data.error)}</span></div>`; return; }
      if(!data.rewards?.length){ out.innerHTML=`<div class="state"><div class="empty-num">0</div><div class="ps-kicker" style="margin-top:8px">Coffre vide — reviens après un live 🔥</div></div>`; return; }
      renderList(data.rewards, npub, false);
    }

    function renderDemo(){
      const npub="npub1xar9lt2s5xh5zs5l463cr3rv23hyfdq940wzscszlmu6qm6ndghsyq5sws";
      input.value=npub;
      renderList([
        { id:"a1b2c3d4", amount:21000, reason:"Meilleur clip du live 🎬", ref:"pumpstr-claim&net=mutinynet&tapTree=01c04420…&amount=21000", createdAt:Date.now()-36e5 },
        { id:"9f8e7d6c", amount:5000, reason:"Challenge relevé", ref:"pumpstr-claim&net=mutinynet&tapTree=01c04420…&amount=5000", createdAt:Date.now()-864e5 },
        { id:"55aa00ff", amount:333, reason:"", ref:"pumpstr-claim&net=mutinynet&tapTree=01c04420…&amount=333", createdAt:Date.now()-6048e5 },
      ], npub, true);
    }

    $("#go").addEventListener("click", load);
    input.addEventListener("keydown",(e)=>{ if(e.key==="Enter") load(); });
    const params = new URLSearchParams(location.search);
    const pre = params.get("to") || params.get("npub");
    if(params.get("demo")==="1") renderDemo();
    else if(pre){ input.value=pre; load(); }
  </script>
</body>
</html>
