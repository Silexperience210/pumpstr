<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pumpstr · tip</title>
<link rel="stylesheet" href="/pumpstr.css" />
<style>
  body{ display:flex; align-items:center; justify-content:center; padding:20px; }
  .card{ width:min(440px,94vw); padding:26px; }
  .brand{ font-family:var(--display); font-weight:800; font-size:20px; display:flex; align-items:center; gap:8px; }
  .brand b{ color:var(--lime); text-shadow:0 0 18px rgba(188,255,46,.45); }
  .sub{ color:var(--txt-dim); font-size:13px; margin:4px 0 18px; }

  .id{ display:flex; align-items:center; gap:11px; background:rgba(0,0,0,.3); border:1px solid var(--line-2);
    border-radius:var(--r-sm); padding:10px 12px; margin-bottom:18px; }
  .id img{ width:36px; height:36px; border-radius:50%; background:var(--ink-2); flex:0 0 36px; }
  .id .who{ flex:1; min-width:0; } .id .who b{ font-family:var(--display); font-size:14px; }
  .id .who small{ display:block; font-family:var(--mono); color:var(--txt-faint); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .row{ display:flex; gap:10px; margin-bottom:13px; }
  .amt{ flex:1; padding:15px 8px; text-align:center; border-radius:var(--r-sm); cursor:pointer;
    font-family:var(--mono); font-weight:800; font-size:18px; color:var(--txt);
    background:rgba(255,255,255,.03); border:1px solid var(--line-2); transition:.16s var(--ease); }
  .amt:hover{ border-color:var(--line); transform:translateY(-1px); }
  .amt.sel{ background:rgba(188,255,46,.12); border-color:var(--lime); color:var(--lime); box-shadow:0 0 22px -6px rgba(188,255,46,.5); }
  .amt small{ display:block; font-weight:500; color:var(--txt-faint); font-size:11px; letter-spacing:.06em; }

  .btns{ display:flex; gap:10px; margin-top:15px; }
  .act{ flex:1; }
  .out{ margin-top:18px; display:none; } .out.show{ display:block; animation:psRise .5s var(--ease); }
  canvas{ display:block; margin:0 auto 12px; border-radius:12px; background:#fff; padding:10px; box-shadow:0 0 40px -10px rgba(188,255,46,.4); }
  .inv{ font-family:var(--mono); font-size:11px; word-break:break-all; color:var(--txt-dim); background:rgba(0,0,0,.4);
    border:1px solid var(--line-2); padding:11px; border-radius:10px; max-height:90px; overflow:auto; }
  .net{ margin-top:16px; text-align:center; font-size:11px; color:var(--txt-faint); letter-spacing:.02em; }

  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(90px);
    background:var(--lime); color:#06200a; font-family:var(--mono); font-weight:800; padding:14px 22px; border-radius:var(--r-sm);
    box-shadow:0 14px 44px -8px rgba(188,255,46,.6); transition:transform .4s var(--spring); }
  .toast.show{ transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="ps-bg"></div>
  <div class="ps-grain"></div>

  <div class="card ps-card ps-card--glow">
    <div class="brand">⚡<b>PUMPSTR</b></div>
    <div class="sub">Envoie des sats au créateur — signé en Nostr, en direct.</div>

    <div class="id">
      <img id="idAva" alt="" />
      <div class="who"><b id="idName">…</b><small id="idNpub"></small></div>
      <button id="connect" class="ps-btn ps-btn--ghost" style="padding:9px 12px;font-size:11px" title="Extension Nostr (NIP-07)">⚡ Connecter</button>
    </div>

    <div class="row" id="amts">
      <div class="amt sel" data-v="210">210<small>sats</small></div>
      <div class="amt" data-v="2100">2 100<small>sats</small></div>
      <div class="amt" data-v="21000">21 000<small>sats</small></div>
    </div>
    <input id="comment" class="ps-input" placeholder="un mot ? (commentaire du zap)" maxlength="140" />

    <div class="btns">
      <button class="act ps-btn ps-btn--pump" id="pay">⚡ Payer en Lightning</button>
      <button class="act ps-btn ps-btn--ghost" id="sim">▶ Simuler</button>
    </div>

    <div class="out" id="out">
      <canvas id="qr" width="200" height="200"></canvas>
      <div class="inv" id="inv"></div>
    </div>

    <div class="net">MutinyNet (signet) · zap NIP-57 signé · payable depuis tout wallet LN de test</div>
  </div>
  <div class="toast" id="toast">⚡ tip reçu !</div>

<script type="module">
  import { generateSecretKey, getPublicKey, finalizeEvent, nip19 } from "https://esm.sh/nostr-tools@2";

  const RELAYS = ["wss://relay.damus.io", "wss://nos.lol", "wss://relay.primal.net"];
  const dicebear = (seed) => `https://api.dicebear.com/9.x/bottts-neutral/svg?seed=${encodeURIComponent(seed)}`;

  let me = null;
  function setEphemeral() {
    const sk = generateSecretKey();
    const pubkey = getPublicKey(sk);
    me = { mode: "ephemeral", pubkey, sk };
    paintId("anon éphémère", nip19.npubEncode(pubkey), dicebear(pubkey));
  }
  async function connectNip07() {
    if (!window.nostr) { alert("Aucune extension Nostr (NIP-07) détectée. Tu restes en identité éphémère."); return; }
    try {
      const pubkey = await window.nostr.getPublicKey();
      me = { mode: "nip07", pubkey };
      paintId("Nostr connecté", nip19.npubEncode(pubkey), dicebear(pubkey));
    } catch { /* refus */ }
  }
  function paintId(name, npub, ava) {
    document.getElementById("idName").textContent = name;
    document.getElementById("idNpub").textContent = npub;
    document.getElementById("idAva").src = ava;
  }
  document.getElementById("connect").onclick = connectNip07;
  setEphemeral();

  let creatorPk = null;
  fetch("/api/creator").then(r => r.json()).then(j => { try { creatorPk = nip19.decode(j.npub).data; } catch {} });

  let amount = 210;
  const amts = document.getElementById("amts");
  amts.addEventListener("click", (e) => {
    const el = e.target.closest(".amt"); if (!el) return;
    [...amts.children].forEach(c => c.classList.remove("sel"));
    el.classList.add("sel"); amount = Number(el.dataset.v);
  });

  async function signZap() {
    const comment = document.getElementById("comment").value.trim();
    const draft = {
      kind: 9734, created_at: Math.floor(Date.now() / 1000), content: comment,
      tags: [["relays", ...RELAYS], ["amount", String(amount * 1000)], ...(creatorPk ? [["p", creatorPk]] : [])],
    };
    if (me.mode === "nip07") return await window.nostr.signEvent({ ...draft, pubkey: me.pubkey });
    return finalizeEvent(draft, me.sk);
  }

  document.getElementById("pay").onclick = async () => {
    const out = document.getElementById("out"), invEl = document.getElementById("inv");
    invEl.textContent = "génération de la facture…"; out.classList.add("show");
    try {
      const zapRequest = await signZap();
      const r = await fetch("/api/invoice", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ amount, zapRequest }),
      }).then(r => r.json());
      if (!r.bolt11) throw new Error(r.error || "pas de facture");
      invEl.textContent = r.bolt11;
      const _qr = await import("https://esm.sh/qrcode@1.5.4");
      await (_qr.toCanvas ?? _qr.default.toCanvas)(document.getElementById("qr"), r.bolt11.toUpperCase(), { width: 200, margin: 1 });
    } catch (e) { invEl.textContent = "erreur : " + e.message; }
  };

  document.getElementById("sim").onclick = async () => {
    const zapRequest = await signZap();
    await fetch("/api/simulate", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ amount, zapRequest }),
    });
  };

  const toast = document.getElementById("toast");
  const ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`);
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === "tip") {
      toast.textContent = `⚡ +${m.amount.toLocaleString("fr-FR")} sats — ${m.name}`;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2200);
    }
  };
</script>
</body>
</html>
