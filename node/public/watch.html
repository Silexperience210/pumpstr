<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pumpstr · watch</title>
<link rel="stylesheet" href="/pumpstr.css" />
<style>
  html,body{ height:100%; overflow:hidden; }
  #vid{ position:fixed; inset:0; width:100%; height:100%; object-fit:cover; background:var(--ink-1); }
  .scrim{ position:fixed; inset:0; pointer-events:none;
    background:linear-gradient(180deg, rgba(7,10,8,.6) 0%, transparent 22%, transparent 56%, rgba(7,10,8,.9) 100%); }

  .top{ position:fixed; top:16px; left:18px; right:18px; display:flex; align-items:center; gap:12px; z-index:2; }
  .brand{ font-family:var(--display); font-weight:800; font-size:18px; } .brand b{ color:var(--lime); }
  .demo{ font-family:var(--mono); font-size:11px; font-weight:700; color:#06200a; background:var(--lime); padding:3px 9px; border-radius:99px; }
  .host{ display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:13px; color:var(--txt-dim); }
  .host img{ width:28px; height:28px; border-radius:50%; background:var(--ink-2); border:1px solid var(--line); }
  /* LA cagnotte : pill lumineuse qui vibre/zoome quand elle monte */
  .pot{ margin-left:auto; display:flex; align-items:baseline; gap:6px; background:rgba(11,17,13,.7); border:1px solid rgba(188,255,46,.4);
    border-radius:99px; padding:6px 15px; backdrop-filter:blur(10px); box-shadow:0 0 26px -6px rgba(188,255,46,.5); }
  .pot .fire{ font-size:15px; align-self:center; }
  .pot .u{ font-family:var(--mono); font-size:11px; font-weight:500; color:var(--lime-soft); opacity:.85; }
  .count{ display:inline-block; font-family:var(--mono); font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em;
    font-size:clamp(20px,4.4vw,32px); line-height:1; color:var(--lime); text-shadow:0 0 16px rgba(188,255,46,.6); transform-origin:center; }
  .count.pop{ animation:countPop .6s cubic-bezier(.2,1.5,.4,1); }
  @keyframes countPop{ 0%{transform:scale(1)} 22%{transform:scale(1.5) rotate(-3deg); filter:brightness(1.7) drop-shadow(0 0 22px var(--lime))}
    50%{transform:scale(1.12) rotate(2deg)} 72%{transform:scale(1.22) rotate(-1deg)} 100%{transform:scale(1); filter:none} }
  #tipflash{ position:fixed; inset:0; pointer-events:none; opacity:0; z-index:1; background:radial-gradient(60% 50% at 50% 26%, rgba(188,255,46,.30), transparent 70%); }
  #tipflash.on{ animation:tipflash .65s ease-out; }
  @keyframes tipflash{ 0%{opacity:1} 100%{opacity:0} }
  .coin{ position:fixed; z-index:2; pointer-events:none; font-size:26px; will-change:transform,opacity; animation:coinfly 1.6s ease-out forwards; }
  @keyframes coinfly{ 0%{opacity:0; transform:translate(-50%,-50%) scale(.5)} 12%{opacity:1}
    100%{opacity:0; transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) rotate(var(--rot)) scale(1.15)} }

  .float{ position:fixed; left:50%; bottom:170px; transform:translateX(-50%); text-align:center; pointer-events:none; z-index:2;
    animation:rise 2.4s cubic-bezier(.2,.8,.2,1) forwards; }
  .float img{ width:48px; height:48px; border-radius:50%; display:block; margin:0 auto 6px; border:2px solid var(--lime); box-shadow:0 0 18px rgba(188,255,46,.6); background:var(--ink-2); }
  .float .amt{ font-family:var(--mono); font-size:40px; font-weight:800; text-shadow:0 0 22px rgba(188,255,46,.7); }
  .float .amt .s{ color:var(--lime); }
  .float .who{ font-family:var(--mono); font-size:14px; color:var(--magenta); font-weight:700; }
  .float .cmt{ font-family:var(--display); font-size:14px; color:var(--txt); }
  @keyframes rise{ 0%{opacity:0; transform:translate(-50%,22px) scale(.82)} 12%{opacity:1; transform:translate(-50%,0) scale(1)} 100%{opacity:0; transform:translate(-50%,-250px) scale(1.06)} }

  .bar{ position:fixed; left:50%; bottom:18px; transform:translateX(-50%); width:min(660px,94vw); z-index:3;
    background:rgba(11,17,13,.78); backdrop-filter:blur(16px); border:1px solid var(--line-2); border-radius:var(--r); padding:13px; }
  .idrow{ display:flex; align-items:center; gap:9px; margin-bottom:11px; }
  .idrow img{ width:28px; height:28px; border-radius:50%; background:var(--ink-2); }
  .idrow b{ font-family:var(--display); font-size:13px; } .idrow small{ font-family:var(--mono); color:var(--txt-faint); font-size:11px; }
  .controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .amt{ padding:10px 13px; border-radius:var(--r-sm); cursor:pointer; font-family:var(--mono); font-weight:800;
    background:rgba(255,255,255,.03); border:1px solid var(--line-2); transition:.16s; }
  .amt:hover{ border-color:var(--line); }
  .amt.sel{ background:rgba(188,255,46,.12); border-color:var(--lime); color:var(--lime); }
  .controls input{ flex:1; min-width:120px; }
  #unmute{ position:fixed; bottom:140px; right:18px; z-index:3; }

  .modal{ position:fixed; inset:0; background:rgba(7,10,8,.82); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; z-index:9; }
  .modal.show{ display:flex; }
  .modal .box{ padding:22px; text-align:center; width:min(330px,92vw); }
  .modal canvas{ background:#fff; border-radius:12px; padding:10px; box-shadow:0 0 50px -10px rgba(188,255,46,.5); }
  .modal .inv{ font-family:var(--mono); font-size:10px; word-break:break-all; color:var(--txt-dim); margin-top:12px; max-height:74px; overflow:auto; }
</style>
</head>
<body>
  <video id="vid" autoplay muted playsinline></video>
  <div class="scrim"></div>
  <div id="tipflash"></div>

  <div class="top">
    <div class="brand">⚡<b>PUMPSTR</b></div>
    <div class="ps-pill ps-pill--live">Live</div>
    <span class="demo" id="demo" style="display:none">flux démo</span>
    <div class="pot" id="pot"><span class="fire">🔥</span><span class="count" id="count">0</span><span class="u">sats</span></div>
    <div class="host"><img id="hostAva" alt="" /> <span id="hostName">…</span></div>
  </div>

  <button id="unmute" class="ps-btn ps-btn--ghost">🔊 activer le son</button>

  <div class="bar">
    <div class="idrow">
      <img id="idAva" alt="" /><div><b id="idName">…</b><br><small id="idNpub"></small></div>
      <button id="connect" class="ps-btn ps-btn--ghost" style="margin-left:auto;padding:8px 11px;font-size:11px">⚡ Connecter Nostr</button>
    </div>
    <div class="controls">
      <div class="amt sel" data-v="210">210</div>
      <div class="amt" data-v="2100">2 100</div>
      <div class="amt" data-v="21000">21 000</div>
      <input id="comment" class="ps-input" placeholder="un mot ?" maxlength="140" />
      <button class="act ps-btn ps-btn--ghost" id="sim">▶ Simuler</button>
      <button class="act ps-btn ps-btn--pump" id="pay">⚡ Tip</button>
    </div>
  </div>

  <div class="modal" id="modal"><div class="box ps-card">
    <canvas id="qr" width="220" height="220"></canvas>
    <div class="inv" id="inv"></div>
    <button class="x ps-btn ps-btn--ghost" id="close" style="width:100%;margin-top:14px;justify-content:center">fermer</button>
  </div></div>

<script type="module">
  import Hls from "https://cdn.jsdelivr.net/npm/hls.js@1/+esm";
  import { generateSecretKey, getPublicKey, finalizeEvent, nip19 } from "https://esm.sh/nostr-tools@2";

  const RELAYS = ["wss://relay.damus.io", "wss://nos.lol", "wss://relay.primal.net"];
  const DEMO_HLS = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
  const dicebear = (s) => `https://api.dicebear.com/9.x/bottts-neutral/svg?seed=${encodeURIComponent(s || "x")}`;
  const esc = (s) => String(s ?? "").replace(/[<>&]/g, (c) => ({ "<":"&lt;", ">":"&gt;", "&":"&amp;" }[c]));
  const fmt = (n) => n.toLocaleString("fr-FR");

  const vid = document.getElementById("vid");
  const { url } = await fetch("/api/stream").then((r) => r.json()).catch(() => ({}));
  let hls = null;
  function playHls() {
    vid.srcObject = null;
    const src = url || DEMO_HLS;
    if (!url) document.getElementById("demo").style.display = "";
    if (vid.canPlayType("application/vnd.apple.mpegurl")) vid.src = src;
    else if (Hls.isSupported()) { hls = new Hls(); hls.loadSource(src); hls.attachMedia(vid); }
    else vid.src = src;
  }
  function stopHls() { if (hls) { try { hls.destroy(); } catch {} hls = null; } vid.removeAttribute("src"); try { vid.load(); } catch {} }
  playHls();
  document.getElementById("unmute").onclick = (e) => { vid.muted = false; vid.play(); e.target.style.display = "none"; };

  let creatorPk = null;
  fetch("/api/creator").then((r) => r.json()).then((j) => {
    try { creatorPk = nip19.decode(j.npub).data; } catch {}
    document.getElementById("hostName").textContent = j.npub ? j.npub.slice(0, 12) + "…" : "créateur";
    document.getElementById("hostAva").src = dicebear(creatorPk || "host");
  });

  let me = null;
  function paintId(name, npub, ava) {
    document.getElementById("idName").textContent = name;
    document.getElementById("idNpub").textContent = npub;
    document.getElementById("idAva").src = ava;
  }
  function setEph() { const sk = generateSecretKey(); const pk = getPublicKey(sk); me = { mode: "eph", pk, sk }; paintId("anon éphémère", nip19.npubEncode(pk), dicebear(pk)); }
  document.getElementById("connect").onclick = async () => {
    if (!window.nostr) return alert("Pas d'extension Nostr (NIP-07). Tu restes éphémère.");
    try { const pk = await window.nostr.getPublicKey(); me = { mode: "nip07", pk }; paintId("Nostr connecté", nip19.npubEncode(pk), dicebear(pk)); } catch {}
  };
  setEph();

  let amount = 210;
  const ctrl = document.querySelector(".controls");
  ctrl.addEventListener("click", (e) => { const el = e.target.closest(".amt"); if (!el) return;
    document.querySelectorAll(".amt").forEach((c) => c.classList.remove("sel")); el.classList.add("sel"); amount = Number(el.dataset.v); });

  async function signZap() {
    const comment = document.getElementById("comment").value.trim();
    const draft = { kind: 9734, created_at: Math.floor(Date.now() / 1000), content: comment,
      tags: [["relays", ...RELAYS], ["amount", String(amount * 1000)], ...(creatorPk ? [["p", creatorPk]] : [])] };
    return me.mode === "nip07" ? await window.nostr.signEvent({ ...draft, pubkey: me.pk }) : finalizeEvent(draft, me.sk);
  }
  document.getElementById("sim").onclick = async () => {
    await fetch("/api/simulate", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ amount, zapRequest: await signZap() }) });
  };
  const modal = document.getElementById("modal");
  document.getElementById("pay").onclick = async () => {
    const inv = document.getElementById("inv"); inv.textContent = "facture…"; modal.classList.add("show");
    try {
      const r = await fetch("/api/invoice", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ amount, zapRequest: await signZap() }) }).then((r) => r.json());
      if (!r.bolt11) throw new Error(r.error || "pas de facture");
      inv.textContent = r.bolt11;
      const _qr = await import("https://esm.sh/qrcode@1.5.4");
      await (_qr.toCanvas ?? _qr.default.toCanvas)(document.getElementById("qr"), r.bolt11.toUpperCase(), { width: 220, margin: 1 });
    } catch (e) { inv.textContent = "erreur : " + e.message; }
  };
  document.getElementById("close").onclick = () => modal.classList.remove("show");

  let total = 0, shown = 0;
  const countEl = document.getElementById("count");
  function animate() { const step = () => { const d = total - shown; if (Math.abs(d) < 1) { shown = total; countEl.textContent = fmt(total); return; } shown += d * 0.2; countEl.textContent = fmt(Math.round(shown)); requestAnimationFrame(step); }; step(); }
  const COINS = ["⚡", "🪙", "₿", "✦", "💸"];
  function pulseCount() { countEl.classList.remove("pop"); void countEl.offsetWidth; countEl.classList.add("pop"); }
  function screenFlash() { const f = document.getElementById("tipflash"); f.classList.remove("on"); void f.offsetWidth; f.classList.add("on"); }
  function coinBurst(amount) {
    const r = document.getElementById("pot").getBoundingClientRect();
    const ox = r.left + r.width / 2, oy = r.top + r.height / 2;
    const n = Math.min(34, 6 + Math.round(amount / 500));        // plus c'est gros, plus ça crache
    for (let i = 0; i < n; i++) {
      const c = document.createElement("div"); c.className = "coin"; c.textContent = COINS[(Math.random() * COINS.length) | 0];
      c.style.left = ox + "px"; c.style.top = oy + "px";
      c.style.setProperty("--dx", (Math.random() * 420 - 210) + "px");
      c.style.setProperty("--dy", (Math.random() * 520 - 160) + "px");
      c.style.setProperty("--rot", (Math.random() * 760 - 380) + "deg");
      c.style.animationDelay = (Math.random() * .18) + "s";
      document.body.appendChild(c); setTimeout(() => c.remove(), 1700);
    }
  }
  function floatTip(t) {
    total = (typeof t.pot === "number") ? t.pot : total + t.amount; // cagnotte serveur = tous les viewers synchro
    animate(); pulseCount(); coinBurst(t.amount);
    if (t.amount >= 2000) screenFlash();                            // gros tip = flash plein écran
    const big = Math.min(1.9, 1 + t.amount / 6000);                 // gros tip = gros plan
    const f = document.createElement("div"); f.className = "float";
    const ava = t.picture || dicebear(t.pubkey || t.name);
    f.innerHTML = `<img src="${esc(ava)}" onerror="this.src='${dicebear(t.name)}'" /><div class="amt" style="font-size:${Math.round(40 * big)}px">+${fmt(t.amount)} <span class="s">⚡</span></div><div class="who">${esc(t.name || "anon")}</div>${t.comment ? `<div class="cmt">“${esc(t.comment)}”</div>` : ""}`;
    document.body.appendChild(f); setTimeout(() => f.remove(), 2400);
  }
  /* ---- viewer WebRTC : reçoit le flux P2P du créateur en direct ; sinon HLS/démo ---- */
  const VICE = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun.cloudflare.com:3478" }] };
  const livePill = document.querySelector(".ps-pill--live");
  let vpc = null;
  const joinLive = () => { try { ws.send(JSON.stringify({ type: "join" })); } catch {} };
  async function onSignal(m) {
    if (m.type === "live-started") joinLive();
    else if (m.type === "offer") {
      if (vpc) { try { vpc.close(); } catch {} }
      vpc = new RTCPeerConnection(VICE);
      vpc.ontrack = (e) => { stopHls(); vid.srcObject = e.streams[0]; document.getElementById("demo").style.display = "none";
        vid.muted = true; vid.play?.().catch(() => {}); if (livePill) livePill.textContent = "● EN DIRECT"; };
      vpc.onicecandidate = (e) => { if (e.candidate) ws.send(JSON.stringify({ type: "ice", candidate: e.candidate })); };
      try {
        await vpc.setRemoteDescription({ type: "offer", sdp: m.sdp });
        const ans = await vpc.createAnswer(); await vpc.setLocalDescription(ans);
        ws.send(JSON.stringify({ type: "answer", sdp: ans.sdp }));
      } catch {}
    }
    else if (m.type === "ice" && m.candidate) { try { await vpc?.addIceCandidate(m.candidate); } catch {} }
    else if (m.type === "live-ended" || m.type === "no-live") {
      if (vpc) { try { vpc.close(); } catch {} vpc = null; }
      if (livePill) livePill.textContent = "Live"; playHls();
    }
  }
  const ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`);
  ws.onopen = () => joinLive();
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === "tip") floatTip({ amount: Number(m.amount), pot: m.pot, name: m.name, picture: m.picture, comment: m.comment, pubkey: m.pubkey });
    else if (m.type === "pot") { total = Number(m.pot) || 0; animate(); pulseCount(); }
    else if (m.type === "offer" || m.type === "ice" || m.type === "live-started" || m.type === "live-ended" || m.type === "no-live") onSignal(m);
  };
</script>
</body>
</html>
