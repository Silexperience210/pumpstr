name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  workspace:
    name: typecheck + tests (rail · node · portal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # engine du SDK Arkade (>=22.12 <25)
      # npm install (pas `ci`) : le lock peut être généré sous Windows ; `ci` casserait sur
      # les binaires optionnels spécifiques plateforme. Les tests sont purs / mockés (pas d'opérateur).
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
